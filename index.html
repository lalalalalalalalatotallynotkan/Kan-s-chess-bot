<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>♔Hyperfish♚</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <canvas id="cv" width="480" height="480"></canvas>
    <div id="panel">
      <h2>♔Hyperfish♚</h2>
      <div id="status">Your turn...</div>
      <div id="info">Ready to play.</div>
      
      <div class="compact-row">
        <label>Player:</label>
        <select id="color">
          <option value="white">White</option> 
          <option value="black">Black</option>
        </select>
        <label class="right">Time:</label>
        <select id="ttime" style="flex:0.8">
          <option value="0.1">0.1</option>
          <option value="1">1ms</option>
          <option value="1000">1s</option>
          <option value="2000">2s</option>
          <option value="3000">3s</option>
          <option value="5000">5s</option>
          <option value="10000" selected>10s</option>
          <option value="20000">20s</option>
          <option value="30000">30s</option>
          <option value="60000">1m</option>
          <option value="120000">2m</option>
          <option value="180000">3m</option>
          <option value="300000">5m</option>
          <option value="600000">10m</option>
          <option value="1200000">20m</option>
          <option value="1800000">30m</option>
          <option value="3600000">1h</option>
          <option value="7200000">2h</option>
          <option value="10800000">3h</option>
          <option value="21600000">6h</option>
          <option value="43200000">12h</option>
          <option value="64800000">18h</option>
          <option value="86400000">24h</option>
        </select>
      </div>
      
      <div class="compact-row">
        <input type="text" id="fen" placeholder="FEN" style="font-size:11px;flex:1" readonly>
        <button onclick="copyFEN()" style="flex:0.4;padding:4px 6px;font-size:11px;background:#0fbcf9;border:none;border-radius:4px;cursor:pointer;color:#000;font-weight:bold">Copy</button>
      </div>
      
      <div class="btn-row">
        <button onclick="newGame()">New</button>
        <button onclick="undoTwo()">Undo</button>
        <button onclick="flipBrd()">Flip</button>
      </div>
      
      <div id="moveList"></div>
    </div>
  </div>

  <!-- Load modules in correct order -->
  <script src="constants.js"></script>
  <script src="board.js"></script>
  <script src="movegen.js"></script>
  <script src="endgame.js"></script>
  <script src="evaluation.js"></script>
  <script src="search.js"></script>
  <script src="ui.js"></script>
  <script>
  console.log("Hyperfish ready"); 
  console.log("NOTE: due to the way the browser is handled, all user inputs while hyperfish is thinking is delayed until after it has made it's move."+
  "\n This also means, premoves are possible.") </script>
</body>
</html>
